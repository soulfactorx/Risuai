name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.0.11902837"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install frontend deps
        run: pnpm install --force

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Init Tauri Android
        run: pnpm tauri android init
        env:
                NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.11902837
      
      - name: Setup OpenSSL for Android
        run: |
          sudo apt-get install -y pkg-config libssl-dev make
          
          export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.0.11902837
          export TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64
          
          ln -sf $TOOLCHAIN/bin/aarch64-linux-android21-clang $TOOLCHAIN/bin/aarch64-linux-android-gcc
          ln -sf $TOOLCHAIN/bin/armv7a-linux-androideabi21-clang $TOOLCHAIN/bin/arm-linux-androideabi-gcc
          
          export PATH=$TOOLCHAIN/bin:$PATH
          
          git clone https://github.com/openssl/openssl.git --depth 1 --branch openssl-3.0 /tmp/openssl-src
          
          # aarch64 빌드
          cd /tmp/openssl-src
          ./Configure android-arm64 --prefix=/tmp/openssl-arm64 -D__ANDROID_API__=21 \
            CC=aarch64-linux-android21-clang CXX=aarch64-linux-android21-clang++ \
            AR=llvm-ar RANLIB=llvm-ranlib
          make -j4
          make install_sw
          
          # armv7 빌드
          make clean
          ./Configure android-arm --prefix=/tmp/openssl-arm -D__ANDROID_API__=21 \
            CC=armv7a-linux-androideabi21-clang CXX=armv7a-linux-androideabi21-clang++ \
            AR=llvm-ar RANLIB=llvm-ranlib
          make -j4
          make install_sw
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
      
      - name: Build Android APK
        run: pnpm tauri android build --apk
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.11902837
          AARCH64_LINUX_ANDROID_OPENSSL_DIR: /tmp/openssl-arm64
          AARCH64_LINUX_ANDROID_OPENSSL_INCLUDE_DIR: /tmp/openssl-arm64/include
          AARCH64_LINUX_ANDROID_OPENSSL_LIB_DIR: /tmp/openssl-arm64/lib
          ARMV7_LINUX_ANDROIDEABI_OPENSSL_DIR: /tmp/openssl-arm
          ARMV7_LINUX_ANDROIDEABI_OPENSSL_INCLUDE_DIR: /tmp/openssl-arm/include
          ARMV7_LINUX_ANDROIDEABI_OPENSSL_LIB_DIR: /tmp/openssl-arm/lib
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: risuai-android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
